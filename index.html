    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Lộ trình học tập An Ninh Mạng — CLB ECSC EPU"
    />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="./assets/favicons/site.webmanifest" />
    <link rel="shortcut icon" href="./assets/favicons/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/canvas.css" />
    <link rel="stylesheet" href="./css/flowchart.css" />
  </head>

  <body>
    <!-- Page Transition Overlay -->
    <div id="page-transition" class="page-transition is-loading"></div>

    <div class="outer-border">
      <!-- Mobile Blocker Overlay -->
      <div id="mobile-blocker" class="mobile-blocker">
        <div class="mobile-blocker__content">
          <i class="fa-solid fa-terminal mobile-blocker__icon"></i>
          <h2>NEED A BIGGER SCREEN</h2>
          <p>
            Nền tảng ECSC Learning có giao diện tương tác phức tạp, cần không
            gian hiển thị rộng. Vui lòng truy cập bằng thiết bị có màn hình lớn
            hơn để tiếp tục.
          </p>
        </div>
      </div>

      <div class="inner-border">
        <!-- Top Bar -->
        <div class="top-bar">
          <a href="https://ecsc-epu.github.io" class="top-bar__logo">
            <img src="./assets/logo.svg" alt="ECSC Logo" />
            <span class="top-bar__logo-text">
              <span class="red">E</span>CSC
            </span>
          </a>
          <nav class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb__item breadcrumb__item--active"
              >&gt; Roadmap</span
            >
          </nav>
        </div>

        <!-- Canvas Area -->
        <div id="canvas-container" style="flex: 1">
          <div id="infinite-canvas">
            <!-- Grid -->
            <div class="grid-layer">
              <div class="major-grid" id="majorGrid"></div>
              <div class="dot-grid" id="dotGrid"></div>
            </div>

            <!-- Particles background -->
            <canvas id="bg-canvas"></canvas>

            <!-- Edges SVG -->
            <svg id="edges-svg">
              <defs>
                <marker
                  id="arrowhead"
                  markerWidth="6"
                  markerHeight="6"
                  refX="5"
                  refY="3"
                  orient="auto"
                >
                  <path d="M0,0 L6,3 L0,6" fill="var(--border-yellow)" />
                </marker>
              </defs>
            </svg>

            <!-- View Title (now part of the world) -->
            <div
              id="world-title-container"
              style="
                position: absolute;
                z-index: 20;
                transform-origin: top center;
              "
            >
              <div class="view-title" id="viewTitle">
                <span class="red-text">E</span>CSC Roadmap
              </div>
            </div>

            <!-- Nodes -->
            <div id="nodes-container"></div>

            <!-- Help Toast -->
            <div class="help-toast" id="helpToast">
              Kéo để di chuyển · Cuộn để zoom · <kbd>0</kbd> reset
            </div>

            <!-- Minimap -->
            <div class="minimap" id="minimap">
              <div class="minimap-grid"></div>
              <div class="minimap-origin"></div>
              <div class="minimap-nodes"></div>
              <div class="minimap-viewport" id="minimapViewport"></div>
            </div>

            <!-- HUD -->
            <div class="hud" id="hud">
              <div class="hud-item">
                <span>X</span>
                <span class="hud-value" id="hudX">0</span>
              </div>
              <div class="hud-divider"></div>
              <div class="hud-item">
                <span>Y</span>
                <span class="hud-value" id="hudY">0</span>
              </div>
              <div class="hud-divider"></div>
              <div class="hud-item">
                <span>Zoom</span>
                <span class="hud-value" id="hudZoom">100%</span>
              </div>
              <div class="hud-divider"></div>
              <button class="hud-btn" id="resetBtn" title="Reset view">
                ⌂ Reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS (order matters: utils → canvas → flowchart → nav → particles → app) -->
    <script>
      // Injected by Static Site Generator
      window.PAGE_DATA = {

          {

          },
        ],
        nodes: [
          {
            id: "beginner",

          },
          {

            x: -280,
            y: 120,
            color: "#4ea8de",
            status: "available",

            targetHtml: "./pages/courses/blueteam.html",
          },
          {

    <script src="./js/transition.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/canvas.js"></script>
    <script src="./js/flowchart.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="./js/particles.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
