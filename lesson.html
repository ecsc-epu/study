<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECSC — Bài Giảng</title>
    <meta name="description" content="Bài giảng học tập — CLB ECSC EPU" />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicons/favicon-16x16.png"
    />
    <link rel="shortcut icon" href="assets/favicons/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/lesson.css" />
  </head>

  <body>
    <!-- Page Transition Overlay -->
    <div id="page-transition" class="page-transition is-loading"></div>

    <div class="outer-border">
      <div class="inner-border">
        <!-- Particles background -->
        <canvas
          id="bg-canvas"
          style="
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
          "
        ></canvas>

        <!-- Top Bar -->
        <div class="top-bar">
          <a href="https://ecsc-epu.github.io" class="top-bar__logo">
            <img src="assets/logo.svg" alt="ECSC Logo" />
            <span class="top-bar__logo-text">
              <span class="red">E</span>CSC
            </span>
          </a>
          <nav class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb__item">> Loading...</span>
          </nav>
        </div>

        <!-- Lesson Content -->
        <div class="lesson-page">
          <div class="lesson-content" id="lessonContent">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script src="js/transition.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/lesson-page.js"></script>
  </body>
</html>
