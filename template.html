<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECSC — Learning Roadmap</title>
    <meta
      name="description"
      content="Lộ trình học tập An Ninh Mạng — CLB ECSC EPU"
    />

    <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{BASE_PATH}}assets/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="{{BASE_PATH}}assets/favicons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="{{BASE_PATH}}assets/favicons/favicon-16x16.png"
    />
    <link rel="manifest" href="{{BASE_PATH}}assets/favicons/site.webmanifest" />
    <link rel="shortcut icon" href="{{BASE_PATH}}assets/favicons/favicon.ico" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="{{BASE_PATH}}css/variables.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}css/components.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}css/canvas.css" />
    <link rel="stylesheet" href="{{BASE_PATH}}css/flowchart.css" />
  </head>

  <body>
    <!-- Page Transition Overlay -->
    <div id="page-transition" class="page-transition is-loading"></div>

    <div class="outer-border">
      <div class="inner-border">
        <!-- Top Bar -->
        <div class="top-bar">
          <a href="https://ecsc-epu.github.io" class="top-bar__logo">
            <img src="{{BASE_PATH}}assets/logo.svg" alt="ECSC Logo" />
            <span class="top-bar__logo-text">
              <span class="red">E</span>CSC
            </span>
          </a>
          <nav class="breadcrumb" id="breadcrumb">{{BREADCRUMB}}</nav>
        </div>

        <!-- Canvas Area -->
        <div id="canvas-container" style="flex: 1">
          <div id="infinite-canvas">
            <!-- Grid -->
            <div class="grid-layer">
              <div class="major-grid" id="majorGrid"></div>
              <div class="dot-grid" id="dotGrid"></div>
            </div>

            <!-- Particles background -->
            <canvas id="bg-canvas"></canvas>

            <!-- Edges SVG -->
            <svg id="edges-svg">
              <defs>
                <marker
                  id="arrowhead"
                  markerWidth="6"
                  markerHeight="6"
                  refX="5"
                  refY="3"
                  orient="auto"
                >
                  <path d="M0,0 L6,3 L0,6" fill="var(--border-yellow)" />
                </marker>
              </defs>
            </svg>

            <!-- View Title (now part of the world) -->
            <div
              id="world-title-container"
              style="
                position: absolute;
                z-index: 20;
                transform-origin: top center;
              "
            >
              <div class="view-title" id="viewTitle">{{TITLE}}</div>
            </div>

            <!-- Nodes -->
            <div id="nodes-container"></div>

            <!-- Help Toast -->
            <div class="help-toast" id="helpToast">
              Kéo để di chuyển · Cuộn để zoom · <kbd>0</kbd> reset
            </div>

            <!-- Minimap -->
            <div class="minimap" id="minimap">
              <div class="minimap-grid"></div>
              <div class="minimap-origin"></div>
              <div class="minimap-nodes"></div>
              <div class="minimap-viewport" id="minimapViewport"></div>
            </div>

            <!-- HUD -->
            <div class="hud" id="hud">
              <div class="hud-item">
                <span>X</span>
                <span class="hud-value" id="hudX">0</span>
              </div>
              <div class="hud-divider"></div>
              <div class="hud-item">
                <span>Y</span>
                <span class="hud-value" id="hudY">0</span>
              </div>
              <div class="hud-divider"></div>
              <div class="hud-item">
                <span>Zoom</span>
                <span class="hud-value" id="hudZoom">100%</span>
              </div>
              <div class="hud-divider"></div>
              <button class="hud-btn" id="resetBtn" title="Reset view">
                ⌂ Reset
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS (order matters: utils → canvas → flowchart → nav → particles → app) -->
    <script>
      // Injected by Static Site Generator
      window.PAGE_DATA = {{ PAGE_DATA }};
      window.BASE_PATH = '{{BASE_PATH}}';
    </script>
    <script src="{{BASE_PATH}}js/transition.js"></script>
    <script src="{{BASE_PATH}}js/utils.js"></script>
    <script src="{{BASE_PATH}}js/canvas.js"></script>
    <script src="{{BASE_PATH}}js/flowchart.js"></script>
    <script src="{{BASE_PATH}}js/navigation.js"></script>
    <script src="{{BASE_PATH}}js/particles.js"></script>
    <script src="{{BASE_PATH}}js/app.js"></script>
  </body>
</html>
