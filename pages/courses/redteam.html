        <div id="mobile-blocker" class="mobile-blocker">

            </div>
        </div>

        <div class="inner-border">

                </nav>
            </div>

            <!-- Canvas Area -->
            <div id="canvas-container" style="flex: 1;">
                <div id="infinite-canvas">
                    <!-- Grid -->
                    <div class="grid-layer">
                        <div class="major-grid" id="majorGrid"></div>
                        <div class="dot-grid" id="dotGrid"></div>
                    </div>

                    <!-- Particles background -->
                    <canvas id="bg-canvas"></canvas>

                    <!-- Edges SVG -->
                    <svg id="edges-svg">
                        <defs>
                            <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
                                <path d="M0,0 L6,3 L0,6" fill="var(--border-yellow)" />
                            </marker>
                        </defs>
                    </svg>

                    <!-- View Title (now part of the world) -->
                    <div id="world-title-container"
                        style="position: absolute; z-index: 20; transform-origin: top center;">
                        <div class="view-title" id="viewTitle">Intro to Red Team</div>
                    </div>

                    <!-- Nodes -->
                    <div id="nodes-container"></div>

                    <!-- Help Toast -->
                    <div class="help-toast" id="helpToast">
                        Kéo để di chuyển · Cuộn để zoom · <kbd>0</kbd> reset
                    </div>

                    <!-- Minimap -->
                    <div class="minimap" id="minimap">
                        <div class="minimap-grid"></div>
                        <div class="minimap-origin"></div>
                        <div class="minimap-nodes"></div>
                        <div class="minimap-viewport" id="minimapViewport"></div>
                    </div>

                    <!-- HUD -->
                    <div class="hud" id="hud">
                        <div class="hud-item">
                            <span>X</span>
                            <span class="hud-value" id="hudX">0</span>
                        </div>
                        <div class="hud-divider"></div>
                        <div class="hud-item">
                            <span>Y</span>
                            <span class="hud-value" id="hudY">0</span>
                        </div>
                        <div class="hud-divider"></div>
                        <div class="hud-item">
                            <span>Zoom</span>
                            <span class="hud-value" id="hudZoom">100%</span>
                        </div>
                        <div class="hud-divider"></div>
                        <button class="hud-btn" id="resetBtn" title="Reset view">⌂ Reset</button>
                    </div>
                </div>

            </div>
        </div>
